  function loadState(){
    let parsed=null; try { parsed = JSON.parse(localStorage.getItem(STORAGE_KEY)||"null"); } catch(_e){}
    const s=Object.assign(defaultState(), parsed||{});
    s.zones = Array.isArray(s.zones) && s.zones.length>=25 ? s.zones : seedZones();
    s.users = Array.isArray(s.users) ? s.users : [];
    const legacySkillMap={"Systems Thinking":"systemsThinking","Analytical Thinking":"analyticalThinking","Prioritization":"prioritization","Adaptability":"adaptability","Resource Efficiency":"resourceEfficiency","Strategic Thinking":"strategicThinking","Collaboration":"collaboration","Leadership":"leadership","Crisis Response":"crisisResponse","Execution Reliability":"executionReliability","Negotiation":"collaboration"};
    s.users.forEach(u=>{
      const next=baseUser();
      Object.entries(u.skills||{}).forEach(([k,v])=>{ next[legacySkillMap[k]||k]=v; });
      u.skills=next;
    });
    if (!s.currentUserId && s.currentUser && s.currentUser.id) s.currentUserId = s.currentUser.id; // migration
    delete s.currentUser;
    return s;
  }

  function topSkills(s){ return [...Object.entries(s)].sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]); }
  function lowSkills(s){ return [...Object.entries(s)].sort((a,b)=>a[1]-b[1]).slice(0,2).map(x=>x[0]); }

  function roleFitFromSkills(skills){
    const profiles={
      "Software Engineering":{systemsThinking:.28,executionReliability:.25,analyticalThinking:.2,adaptability:.12,collaboration:.15},
      "Data / Analytics":{analyticalThinking:.35,systemsThinking:.25,prioritization:.2,executionReliability:.2},
      "Finance / Analyst":{analyticalThinking:.32,prioritization:.22,strategicThinking:.16,executionReliability:.3},
      "Operations":{resourceEfficiency:.28,executionReliability:.28,collaboration:.2,crisisResponse:.24},
      "Product / Strategy":{systemsThinking:.22,prioritization:.2,leadership:.18,collaboration:.15,strategicThinking:.25},
      "Research / Science":{analyticalThinking:.35,systemsThinking:.3,adaptability:.15,executionReliability:.2}
    };
    return roleFamilies.map(r=>{
      const w=profiles[r]; let score=0;
      Object.keys(w).forEach(sk=>score+=(skills[sk]||0)*w[sk]);
      return {role:r,score:Math.round(score),reason:`Matched because of ${topSkills(skills).map(k=>skillLabelMap[k]||k).join(" + ")}. Gap likely in ${lowSkills(skills).map(k=>skillLabelMap[k]||k).join(" / ")}.`};
    }).sort((a,b)=>b.score-a.score);
  }

  function buildMap(){
    const svg=el.mapSvg;
    svg.innerHTML="";
    const r=33, xStep=142, yStep=104;
    let idx=0;
    for(let row=0; row<5; row++){
      for(let col=0; col<5; col++){
        const z=state.zones[idx++];
        const cx=110 + col*xStep + (row%2?68:0), cy=92 + row*yStep;
        const pts=[0,60,120,180,240,300].map(a=>{const rad=Math.PI*a/180;return `${cx+r*Math.cos(rad)},${cy+r*Math.sin(rad)}`;}).join(" ");
        const p=document.createElementNS("http://www.w3.org/2000/svg","polygon");
        p.setAttribute("points",pts);
        p.setAttribute("class",`hex ${z.owner} ${state.selectedZone===z.id?"selected":""}`);
        p.setAttribute("tabindex","0");
        p.onclick=()=>{ state.selectedZone=z.id; renderMissionPanel(); buildMap(); };
        p.onkeydown=(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); p.onclick(); } };
        const t=document.createElementNS("http://www.w3.org/2000/svg","text");
        t.setAttribute("x",cx-18); t.setAttribute("y",cy+3); t.setAttribute("class","zone-label"); t.textContent=z.id;
        svg.appendChild(p); svg.appendChild(t);
      }
    }
  }

  function getMissionForZone(zone){
    const idx=Math.max(0, Number(zone.id.replace("Z",""))-1);
    return missionScenarios[idx % missionScenarios.length];
  }

  function beginMission(zone, mission){
    state.activeMissionRun={zoneId:zone.id,missionId:mission.id,stepIndex:0,selections:[],effects:{},timeline:[`Mission started: ${mission.title}`],contextEventShown:false};
    logEvent("mission_started",{zone:zone.id,missionId:mission.id});
    markAgent("mission_engine: mission_started");
    renderMissionPanel();
  }

  function applyEffects(user,effects){
    Object.entries(effects).forEach(([k,v])=>{
      user.skills[k]=Math.max(0,Math.min(100,(user.skills[k]||50)+v));
      logEvent("mission_step_completed",{skill:k,delta:v});
    });
  }

  function aggregateEffects(run){
    return run.selections.reduce((acc,s)=>{
      Object.entries(s.effects||{}).forEach(([k,v])=>acc[k]=(acc[k]||0)+v);
      return acc;
    },{});
  }

  function renderMissionPanel(){
    const z=state.zones.find(x=>x.id===state.selectedZone) || state.zones[0];
    if(!state.selectedZone) state.selectedZone=z.id;
    const mission=getMissionForZone(z);
    const run=state.activeMissionRun && state.activeMissionRun.zoneId===z.id ? state.activeMissionRun : null;
    el.zoneBox.innerHTML=`<b>${z.name}</b> (${z.id})<br><span class='mini'>Domain: ${z.domain} · Owner: ${z.owner} · Control: ${z.control}% · Difficulty: ${z.difficulty}</span>`;

    const renderRoot=(root)=>{
      if(!run){
        root.innerHTML=`<b>${mission.title}</b><div class='mini'>${mission.scenario}</div><div class='mini' style='margin-top:6px'>Constraints: ${mission.constraints.join(" · ")}</div><button class='btn mission-choice' data-begin='1'>Begin Mission</button>`;
        const btn=root.querySelector("[data-begin]");
        if(btn) btn.onclick=()=>beginMission(z,mission);
        return;
      }
      const totalSteps=mission.steps.length+1;
      const isFinal=run.stepIndex>=mission.steps.length;
      const step=isFinal?null:mission.steps[run.stepIndex];
      const progress=`Step ${run.stepIndex+1}/${totalSteps}`;
      const contextInfo=isFinal?"Final phase: lock your final strategic decision.":step.context;
      const header=isFinal?mission.finalDecision.text:step.text;
      const options=(isFinal?mission.finalDecision.options:step.options).map((o,i)=>`<button class='btn mission-choice' data-opt='${o.id}'>${i+1}. ${o.text}</button>`).join("");
      const unexpected = (!run.contextEventShown && run.stepIndex===2) ? `<div class='evt'><b>Unexpected Event</b><div class='mini'>${mission.unexpectedEvent}</div></div>` : "";
      root.innerHTML=`<b>${mission.title}</b><div class='mini'>${mission.scenario}</div><div class='mini' style='margin-top:6px'>Constraints: ${mission.constraints.join(" · ")}</div><div class='mini' style='margin-top:6px'><b>${progress}</b></div>${unexpected}<div class='mini' style='margin-top:6px'>${header}</div><div class='mini'>Context: ${contextInfo}</div>${options}`;
      root.querySelectorAll("[data-opt]").forEach(btn=>btn.onclick=()=>advanceMission(z,mission,btn.dataset.opt));
    };

    renderRoot(el.missionBox);
    renderRoot(el.soloBox);
  }

  function buildAgeAware(age,fit){
    if(age==="under 14") return {mode:"future-fit",recommendHiring:false,label:"No direct hiring recommendations.",families:fit.slice(0,3).map(f=>f.role)};
    if(age==="14-17") return {mode:"restricted",recommendHiring:false,label:"Restricted pathway mode with caution labels.",families:fit.slice(0,3).map(f=>f.role)};
    return {mode:"opportunity",recommendHiring:true,label:"Opportunity matching mode",families:fit.slice(0,3).map(f=>f.role)};
  }

  function recommendationsFor(age,fit){
    if(age==="18+") return [{type:"role_matches",items:fit.slice(0,3)},{type:"opportunities",items:seededJobs.filter(j=>j.active).slice(0,4)}];
    return [{type:"future_fit",items:fit.slice(0,4)},{type:"learning_pathway",items:["Communication loops","Scenario prioritization","Systems mapping"]}];
  }

  function normalizeResultPayload({player,zone,mission,timeline,effects,outcomeText}){
    const fit=roleFitFromSkills(player.skills);
    const top=fit[0];
    const score=Math.max(1,Math.min(100,50+Object.values(effects).reduce((a,b)=>a+b,0)));
    return {
      missionId: mission.id,
      score,
      skills:{current:{...player.skills},delta:{...effects}},
      timeline:timeline.map((t,i)=>({t:`T+${i*3}m`,event:t})),
      outcome:outcomeText,
      recommendations:["Run a contrasting scenario to test decision consistency.","Improve the two lowest skills before high-stakes missions."],
      type:"mission_result", version:"2.0.0", id:crypto.randomUUID(), createdAt:new Date().toISOString(),
      player:{id:player.id,name:player.displayName,userType:player.userType,ageGroup:player.ageGroup,rolePath:player.rolePath},
      mission:{zoneId:zone.id,zoneName:zone.name,domain:zone.domain,title:mission.title,scenario:mission.scenario,difficulty:zone.difficulty},
      outcomeMeta:{status:"completed",score,consistency:Math.min(1,0.5+(state.missions.length*0.02))},
      territory:{owner:zone.owner,control:zone.control},
      roleFit:{topRole:top.role,topScore:top.score,matches:fit.slice(0,3),ageAware:buildAgeAware(player.ageGroup, fit)},
      sourceMeta:{mode:hasFirebase?"firebase":"local-mock",jobsVersion:"seed-v1"},
      render:{preferredLayout:["compact","full","story"][state.missions.length%3],theme:"mars-control"},
      exportMeta:{canSvg:true,canFallback:true,schema:"canonical-mission-result-v2"}
    };
  }
  function validateResultPayload(p){ return !!(p&&p.missionId&&typeof p.score==="number"&&p.skills&&Array.isArray(p.timeline)&&p.outcome&&Array.isArray(p.recommendations)); }
  function summarizeResultPayload(p){ return `${p.player.name}: ${p.mission.title} → ${p.score} (${p.roleFit.topRole})`; }

  function buildSvgLayout(payload,layout){
    const w=layout==="full"?860:layout==="story"?720:500;
    const h=layout==="full"?420:layout==="story"?320:260;
    return [`<svg xmlns='http://www.w3.org/2000/svg' width='${w}' height='${h}' viewBox='0 0 ${w} ${h}'>`,`<rect width='100%' height='100%' rx='16' fill='#0f1832' stroke='#2f4168'/>`];
  }
  function renderSkillBars(payload,x,y){
    const entries=Object.entries(payload.skills.delta).slice(0,6);
    return entries.map(([k,v],i)=>`<text x='${x}' y='${y+i*24}' fill='#c7d6ff' font-size='12'>${escapeXml(skillLabelMap[k]||k)}</text><rect x='${x+160}' y='${y-10+i*24}' width='120' height='10' fill='#162645' rx='4'/><rect x='${x+160}' y='${y-10+i*24}' width='${Math.min(120,Math.abs(v)*12)}' height='10' fill='${v>=0?"#00d1b0":"#ff7185"}' rx='4'/>`).join("");
  }
  function renderTimeline(payload,x,y,max){ return (payload.timeline||[]).slice(0,max).map((e,i)=>`<text x='${x}' y='${y+i*18}' fill='#9fb0d9' font-size='11'>${escapeXml(e.t)}: ${escapeXml(e.event)}</text>`).join(""); }
  function renderRoleFit(payload,x,y){ return `<text x='${x}' y='${y}' fill='#63b6ff' font-size='13'>Top Role: ${escapeXml(payload.roleFit.topRole)} (${payload.roleFit.topScore})</text>`; }
  function renderOutcomeBadge(payload,x,y){ return `<rect x='${x}' y='${y-18}' width='120' height='28' rx='8' fill='#1f3f62'/><text x='${x+8}' y='${y}' fill='#fff' font-size='13'>Score ${payload.score}</text>`; }
  function exportSvgString(parts){ return parts.join("")+"</svg>"; }

  function renderResult(payload,valid){
    markAgent("svg_renderer: svg_render_started");
    logEvent("svg_render_started",{id:payload.id});
    try {
      if(!valid) throw new Error("Invalid payload");
      const layout=payload.render.preferredLayout||"compact";
      const s=buildSvgLayout(payload,layout);
      const timelineY = layout==="full" ? 300 : layout==="story" ? 224 : 190;
      const nextY = layout==="full" ? 392 : layout==="story" ? 286 : 244;
      const timelineCount = layout==="compact" ? 3 : 4;
      s.push(`<text x='20' y='28' fill='#f2f5ff' font-size='16' font-weight='700'>${escapeXml(payload.mission.title)}</text>`);
      s.push(`<text x='20' y='48' fill='#9fb0d9' font-size='12'>Player: ${escapeXml(payload.player.name)} · Mission: ${escapeXml(payload.missionId)}</text>`);
      s.push(renderOutcomeBadge(payload,20,76));
      s.push(renderRoleFit(payload,160,76));
      s.push(renderSkillBars(payload,20,120));
      s.push(renderTimeline(payload,20,timelineY,timelineCount));
      s.push(`<text x='20' y='${nextY}' fill='#ffd88f' font-size='11'>Next: ${escapeXml(payload.recommendations[0]||"")}</text>`);
      const svg=exportSvgString(s);
      markAgent("svg_renderer: svg_render_completed");
      logEvent("svg_render_succeeded",{id:payload.id});
      return {svg};
    } catch(err){
      logEvent("svg_render_failed",{id:payload.id,error:String(err)});
      markAgent("svg_renderer: svg_render_failed");
      const fallback={summary:summarizeResultPayload(payload),timeline:(payload.timeline||[]).slice(0,4)};
      logEvent("fallback_render_used",{id:payload.id});
      return {fallback};
    }
  }

  function advanceMission(zone, mission, optionId){
    const run=state.activeMissionRun;
    const user=currentUser();
    if(!run || !user) return;
    const isFinal=run.stepIndex>=mission.steps.length;
    const optionSet=isFinal?mission.finalDecision.options:mission.steps[run.stepIndex].options;
    const option=optionSet.find(o=>o.id===optionId);
    if(!option) return;
    run.selections.push({step:isFinal?"final":mission.steps[run.stepIndex].id,option:option.text,effects:option.effects});
    run.timeline.push(option.timeline || `Decision made: ${option.text}`);
    if(!isFinal && run.stepIndex===2 && !run.contextEventShown){
      run.timeline.push(`Unexpected event: ${mission.unexpectedEvent}`);
      run.contextEventShown=true;
    }
    if(isFinal){
      const effects=aggregateEffects(run);
      applyEffects(user,effects);
      zone.control=Math.max(0,Math.min(100,zone.control+Math.round(Object.values(effects).reduce((a,b)=>a+b,0)/8)));
      if(zone.control>55) zone.owner="player";
      markAgent("skill_analyzer: skill_analysis_started");
      const result = normalizeResultPayload({player:user,zone,mission,timeline:run.timeline,effects,outcomeText:option.outcome||"Mission completed."});
      logEvent("mission_result_payload_created",{id:result.id,missionId:mission.id});
      const valid=validateResultPayload(result);
      markAgent("skill_analyzer: skill_analysis_completed");
      const rendered=renderResult(result, valid);
      const vaultItem={id:result.id,createdAt:new Date().toISOString(),raw:result,normalized:result,svg:rendered.svg||null,fallback:rendered.fallback||null,report:summarizeResultPayload(result),roleFit:result.roleFit};
      state.proofVault.unshift(vaultItem); state.proofVault=state.proofVault.slice(0,120);
      state.missions.unshift(result);
      state.roleFitHistory.unshift(result.roleFit);
      state.activeMissionRun=null;
      markAgent("proof_vault: proof_saved");
      logEvent("proof_saved",{id:result.id});
      logEvent("mission_completed",{id:result.id,missionId:mission.id});
      render();
      return;
    }
    run.stepIndex += 1;
    renderMissionPanel();
  }

  function renderVault(){
    if(!state.proofVault.length){
      el.vaultBox.innerHTML="No proof entries yet. Complete a mission to save evidence.";
      return;
    }
    el.vaultBox.innerHTML = state.proofVault.slice(0,8).map(v=>`<div class='evt'><b>${escapeXml(v.report)}</b><div class='mini'>${escapeXml(v.createdAt)}</div><div class='row' style='margin-top:6px'><button class='btn ghost' data-open='${v.id}'>Open</button><button class='btn ghost' data-dl='${v.id}'>Download SVG</button></div><div id='pv-${v.id}'></div></div>`).join("");

    el.vaultBox.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{
      const v=state.proofVault.find(x=>x.id===b.dataset.open);
      if(!v) return;
      const tgt=document.getElementById(`pv-${v.id}`);
      if(!tgt) return;
      tgt.innerHTML = v.svg
        ? `<div class='mini'>SVG Preview</div>${v.svg}`
        : `<div class='mini'>Fallback summary: ${escapeXml(v.fallback?.summary||"Unavailable")}</div><div class='mini'>${(v.fallback?.timeline||[]).map(t=>escapeXml(`${t.t}: ${t.event}`)).join(" | ")}</div>`;
    });

    el.vaultBox.querySelectorAll("[data-dl]").forEach(b=>b.onclick=()=>{
      const v=state.proofVault.find(x=>x.id===b.dataset.dl);
      if(!v || !v.svg){ alert("No SVG artifact available."); return; }
      const blob=new Blob([v.svg],{type:"image/svg+xml"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download=`proof-${v.id}.svg`; a.click();
      URL.revokeObjectURL(url);
      state.savedReports.push({id:v.id,downloadedAt:new Date().toISOString()});
      saveState();
    });
  }

  // Thread Input Controller
  const wheelState={segs:[],active:-1,gesture:null};
  const wheelCommands=["Move","Select","Inspect","Confirm","Cancel","Skill Panel","Next","Previous","Zoom In","Zoom Out","Open Menu","Context Action"];

  function contextMap(){
    if(state.mode==="Demo Mode") return wheelCommands;
    if(state.mode==="Solo Mission Mode") return ["Select Choice","Confirm","Inspect","Cancel","Next","Previous","Skill Panel","Open Menu","Zoom In","Zoom Out","Move","Context Action"];
    return wheelCommands;
  }

  function buildWheel(){
    el.wheel.querySelectorAll(".seg").forEach(s=>s.remove());
    wheelState.segs=[];
    const labels=contextMap(), R=40, C=50;
    for(let i=0;i<12;i++){
      const a=((i/12)*Math.PI*2)-Math.PI/2;
      const x=C+R*Math.cos(a), y=C+R*Math.sin(a);
      const d=document.createElement("div");
      d.className="seg";
      d.style.left=`${x}%`; d.style.top=`${y}%`;
      d.textContent=`${i+1}`;
      d.title=labels[i];
      d.onclick=()=>dispatchThread(i,1,true);
      el.wheel.appendChild(d);
      wheelState.segs.push(d);
    }
    highlightSeg(-1);
  }

  function highlightSeg(idx){
    wheelState.active=idx;
    wheelState.segs.forEach((s,i)=>s.classList.toggle("a",i===idx));
    el.wheelCenter.textContent=idx<0?"Idle":contextMap()[idx];
  }

  function wheelPos(ev){
    const r=el.wheel.getBoundingClientRect();
    const x=ev.clientX-r.left-r.width/2, y=ev.clientY-r.top-r.height/2;
    const dist=Math.hypot(x,y), ang=(Math.atan2(y,x)+Math.PI*2)%(Math.PI*2);
    const idx=(Math.round((ang/(Math.PI*2))*12)+3)%12;
    return {idx,dist,max:r.width/2};
  }

  function cycleTab(delta){
    const i=tabs.indexOf(state.mode);
    state.mode=tabs[(i+delta+tabs.length)%tabs.length];
    state.recruiterViewed=false;
  }

  function dispatchThread(idx,confidence,clickFallback){
    const command=contextMap()[idx];
    if(confidence<0.34 && !confirm(`Low confidence gesture for '${command}'. Confirm?`)){
      logEvent("gesture_fallback_used",{command});
      return;
    }
    logEvent("thread_command_dispatched",{command,mode:state.mode,confidence});
    if(command==="Open Menu") state.mode="Settings";
    if(command==="Next") cycleTab(1);
    if(command==="Previous") cycleTab(-1);
    if(command==="Select"||command==="Select Choice"){
      const b=el.missionBox.querySelector("button");
      if(b) b.click();
    }
    if(command==="Cancel") state.selectedZone=null;
    if(clickFallback) logEvent("gesture_fallback_used",{method:"accessible_click",command});
    render();
  }

  function bindWheelPointer(){
    const start=(ev)=>{
      if(state.inputMode!=="thread") return;
      ev.preventDefault();
      const p=wheelPos(ev);
      wheelState.gesture={samples:[p]};
      highlightSeg(p.idx);
      logEvent("thread_gesture_started",{idx:p.idx});
    };
    const move=(ev)=>{
      if(!wheelState.gesture || state.inputMode!=="thread") return;
      const p=wheelPos(ev);
      wheelState.gesture.samples.push(p);
      highlightSeg(p.idx);
    };
    const end=(ev)=>{
      if(!wheelState.gesture || state.inputMode!=="thread") return;
      const p=wheelPos(ev);
      const avg=wheelState.gesture.samples.reduce((a,s)=>a+s.dist,0)/wheelState.gesture.samples.length;
      const conf=Math.max(0,Math.min(1,avg/(p.max*0.85)));
      dispatchThread(p.idx,conf,false);
      logEvent("thread_gesture_completed",{idx:p.idx,confidence:conf});
      wheelState.gesture=null;
    };
    el.wheel.addEventListener("pointerdown",start);
    el.wheel.addEventListener("pointermove",move);
    el.wheel.addEventListener("pointerup",end);
    el.wheel.addEventListener("pointercancel",end);
  }

  function renderChips(){
    const u=currentUser();
    el.persistChip.textContent = hasFirebase?"Persistence: Firebase":"Persistence: Local mock";
    el.userChip.textContent = u?`User: ${u.displayName}`:"User: guest";
    el.inputChip.textContent = `Input: ${state.inputMode}`;
    el.toggleInputBtn.textContent=`Mode: ${state.inputMode==="thread"?"Thread":"Standard"}`;
    el.wheel.classList.toggle("hidden", !!state.wheelDocked);
  }

  function render(){
    setupTabs();
    el.panes.forEach(p=>p.classList.toggle("active",p.dataset.pane===state.mode));

    renderAuth();
    renderSkills();
    renderTelemetry();
    renderTutorial();
    renderChips();

    // Always required shared content
    buildMap();
    renderMissionPanel();
    renderRoom();

    // Pane-specific renders to avoid side effects when hidden
    if(state.mode==="Recruiter View") renderRecruiter();
    if(state.mode==="Proof Vault") renderVault();
    if(state.mode==="Settings") renderSettings();

    // Keep content fresh without side effects
    if(state.mode!=="Proof Vault") el.vaultBox.innerHTML = "Proof vault ready. Open this mode to inspect artifacts.";
    if(state.mode!=="Recruiter View") el.recruiterBox.innerHTML = "Recruiter view ready. Open this mode to inspect candidate evidence.";

    buildWheel();
    saveState();
  }

  function val(id){ const n=document.getElementById(id); return n?n.value.trim():""; }
  function escapeXml(str){ return String(str||"").replace(/[<>&'\"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;","'":"&apos;","\"":"&quot;"}[c])); }

    }
  };
  el.tSkip.onclick=()=>{ state.tutorial.active=false; state.tutorial.seen=true; render(); };

  el.replayTutorialBtn.onclick=openTutorial;
  el.toggleInputBtn.onclick=()=>{ state.inputMode=state.inputMode==="thread"?"standard":"thread"; logEvent("input_mode_selected",{mode:state.inputMode}); render(); };
  el.toggleWheelBtn.onclick=()=>{ state.wheelDocked=!state.wheelDocked; saveState(); renderChips(); };
  el.logoutBtn.onclick=()=>{ state.currentUserId=null; state.session=null; saveState(); render(); };

  document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowRight") { cycleTab(1); render(); }
    if(e.key==="ArrowLeft") { cycleTab(-1); render(); }
    if(e.key==="Enter" && state.inputMode==="thread") dispatchThread((wheelState.active+12)%12,1,true);
    if(e.key.toLowerCase()==="t") { state.inputMode=state.inputMode==="thread"?"standard":"thread"; logEvent("input_mode_selected",{mode:state.inputMode}); render(); }
  });

  bindWheelPointer();
  if(!state.tutorial.seen) openTutorial();
  render();
  logEvent("app_loaded",{firebase:hasFirebase});
})();
</script>
</body>
</html>
