<!doctype html>

<head>
  <meta charset="UTF-8" />

  <title>SkillHex Mission Control</title>
  <style>
    :root{--bg:#0b1020;--panel:#121a33;--line:#2a3a66;--txt:#eef3ff;--muted:#9db0df;--blue:#4ea1ff;--gold:#f4c35d;--red:#ff6f7f;--green:#55d38a;--purple:#ae8cff}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 80% -10%,#263a75,#0b1020 55%);color:var(--txt);font-family:Inter,system-ui,sans-serif}
    .app{max-width:1280px;margin:auto;padding:12px;display:grid;gap:10px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grow{flex:1}
    button,input,select{font:inherit}button{background:#1a2750;color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer}
    input,select{background:#0f1730;color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:8px}
    .tabs{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}.tabs button.active{border-color:var(--blue)}
    .layout{display:grid;grid-template-columns:1.35fr .9fr;gap:10px}.pane{display:none}.pane.active{display:block}
    .grid{display:grid;gap:8px}.mission{padding:10px;border:1px solid var(--line);border-radius:10px;background:#0e1730}
    .mini{font-size:.84rem;color:var(--muted)} .skill{display:grid;grid-template-columns:150px 1fr 42px;gap:8px;align-items:center}
    .bar{height:10px;background:#0a1227;border:1px solid #2d416e;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,#66b3ff,#59dfad)}
    .hex-map{width:100%;height:360px;border:1px solid var(--line);border-radius:10px;background:#0d162e}
    .hex{stroke:#d6e2ff;stroke-width:1.5;fill:#334;transition:.35s}.hex.locked{opacity:.35}.hex.science{fill:var(--blue)}.hex.business{fill:var(--gold)}.hex.security{fill:var(--red)}.hex.engineering{fill:var(--green)}.hex.leadership{fill:var(--purple)}
    .hex.captured{filter:drop-shadow(0 0 8px #fff);transform-origin:center;animation:capture .55s ease}
    @keyframes capture{0%{transform:scale(.6)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
    .result{display:grid;gap:6px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#0e1730}
    .anim{transition:width .7s ease}
    .proof{max-height:200px;overflow:auto;border:1px solid var(--line);padding:8px;border-radius:8px;background:#0c1430}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(3,minmax(0,1fr))}}
  </style>
</head>

async function signup(email,password,name,mode){
  if(firebaseReady){
    const cred = await createUserWithEmailAndPassword(auth,email,password);

    await setDoc(doc(db,'players',user.id),{name:user.name,mode:user.mode,skills:user.skills,missionsPlayed:0,missionsCompleted:0,createdAt:serverTimestamp(),email:user.email});
    await setDoc(doc(db,'skillProfiles',user.id),{playerId:user.id,skills:user.skills,totalSkillScore:0,updatedAt:serverTimestamp()});
    return user;
  }
  return {id:crypto.randomUUID(),email,name,mode,password,skills:cloneSkills(),missionsPlayed:0,missionsCompleted:0,createdAt:new Date().toISOString(),proofs:[],history:[]};
}

async function login(email,password){
  if(firebaseReady){
    const cred=await signInWithEmailAndPassword(auth,email,password);
    const snap=await getDoc(doc(db,'players',cred.user.uid));
    if(snap.exists()){
      const d=snap.data();
      const runs = await getDocs(query(collection(db,'missionRuns'),where('playerId','==',cred.user.uid),orderBy('timestamp','desc'),limit(25)));
      const proofs = await getDocs(query(collection(db,'proofVault'),where('playerId','==',cred.user.uid),orderBy('timestamp','desc'),limit(25)));
      return {
        id:cred.user.uid,email,name:d.name||email,mode:d.mode||'player',skills:Object.assign(cloneSkills(),d.skills||{}),
        missionsPlayed:d.missionsPlayed||0,missionsCompleted:d.missionsCompleted||0,createdAt:new Date().toISOString(),
        history:runs.docs.map(x=>x.data()),proofs:proofs.docs.map(x=>x.data())
      };

  function ensurePlayerShape(u){
    if(!u) return;
    u.skills = Object.assign(baseUser(), u.skills||{});
    u.playerStats = Object.assign(emptyPlayerStats(), u.playerStats||{});
    u.missionsPlayed = Number(u.missionsPlayed||u.playerStats.missionsPlayed||0);
    u.missionsCompleted = Number(u.missionsCompleted||u.playerStats.missionsCompleted||0);
    u.averageScore = Number(u.averageScore||u.playerStats.averageScore||0);
    u.averageDecisionTime = Number(u.averageDecisionTime||u.playerStats.averageDecisionTime||0);
    u.skillDistribution = Object.assign({}, u.skillDistribution||u.playerStats.skillDistribution||{});
    u.missionHistory = Array.isArray(u.missionHistory)?u.missionHistory:[];
    u.proofVault = Array.isArray(u.proofVault)?u.proofVault:[];
    u.roleFit = Array.isArray(u.roleFit)?u.roleFit:[];
    u.recentSkillChanges = Array.isArray(u.recentSkillChanges)?u.recentSkillChanges:[];
  }

    if(!hasFirebase || !db) return;
    const u=currentUser();
    if(!u) return;
    try {
      await setDoc(doc(db,'players',u.id), {
        name:u.displayName,
        email:u.email||null,
        userType:u.userType||'player',
        skills:u.skills,
        missionsPlayed:u.missionsPlayed||0,
        missionsCompleted:u.missionsCompleted||0,
        averageScore:u.averageScore||0,
        averageDecisionTime:u.averageDecisionTime||0,
        updatedAt:serverTimestamp(),
        createdAt:u.createdAt||serverTimestamp()

      id:cred.user.uid,
      displayName:profile.name||'Player',
      email,
      userType:profile.userType||'player',
      rolePath:profile.rolePath||'Explorer',
      ageGroup:profile.ageGroup||'18+',
      region:profile.region||'Unknown',
      skills:baseUser(),
      missionsPlayed:0,
      missionsCompleted:0,
      createdAt:new Date().toISOString(),
      tutorialCompleted:false,
      playerStats:emptyPlayerStats(),
      missionHistory:[],
      proofVault:[],
      roleFit:[],
      recentSkillChanges:[]
    };
    ensurePlayerShape(player);
    await setDoc(doc(db,'players',player.id), {
      name:player.displayName,
      email:player.email,
      userType:player.userType,
      rolePath:player.rolePath,

  function topSkills(s){ return [...Object.entries(s)].sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]); }
  function lowSkills(s){ return [...Object.entries(s)].sort((a,b)=>a[1]-b[1]).slice(0,2).map(x=>x[0]); }

  function roleFitFromSkills(skills){
    const mapping=[
      {role:"Software Engineering",rules:[["systemsThinking",0.28],["analyticalThinking",0.24],["executionReliability",0.22],["adaptability",0.14],["collaboration",0.12]]},
      {role:"Operations Analyst",rules:[["systemsThinking",0.24],["prioritization",0.2],["resourceEfficiency",0.2],["crisisResponse",0.18],["executionReliability",0.18]]},
      {role:"Product Manager",rules:[["prioritization",0.24],["strategicThinking",0.24],["collaboration",0.2],["leadership",0.18],["adaptability",0.14]]},
      {role:"Systems Engineer",rules:[["systemsThinking",0.3],["resourceEfficiency",0.2],["crisisResponse",0.2],["executionReliability",0.18],["analyticalThinking",0.12]]},
      {role:"Strategy Analyst",rules:[["analyticalThinking",0.3],["strategicThinking",0.28],["prioritization",0.18],["systemsThinking",0.14],["adaptability",0.1]]}
    ];
    return mapping.map(({role,rules})=>{
      const score=rules.reduce((sum,[k,w])=>sum+((skills[k]||0)*w),0);
      const confidence=Math.max(35,Math.min(99,Math.round(score)));
      return { role, score:Math.round(score), confidence,
        reason:`Signals strongest in ${topSkills(skills).map(k=>skillLabelMap[k]||k).join(" + ")}. Improve ${lowSkills(skills).map(k=>skillLabelMap[k]||k).join(" / ")}.`};
    }).sort((a,b)=>b.score-a.score);
  }

    let idx=0;
    for(let row=0; row<5; row++){
      for(let col=0; col<5; col++){
        const z=state.zones[idx++];
        const cx=110 + col*xStep + (row%2?68:0), cy=92 + row*yStep;
        const pts=[0,60,120,180,240,300].map(a=>{const rad=Math.PI*a/180;return `${cx+r*Math.cos(rad)},${cy+r*Math.sin(rad)}`;}).join(" ");
        const p=document.createElementNS("http://www.w3.org/2000/svg","polygon");
        p.setAttribute("points",pts);
        p.setAttribute("class",`hex ${z.owner} ${state.selectedZone===z.id?"selected":""}`);
        p.setAttribute("tabindex","0");
        p.onclick=()=>{ state.selectedZone=z.id; renderMissionPanel(); buildMap(); };
        p.onkeydown=(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); p.onclick(); } };

        t.setAttribute("x",cx-18); t.setAttribute("y",cy+3); t.setAttribute("class","zone-label"); t.textContent=z.id;

  function renderMissionPanel(){
    const z=state.zones.find(x=>x.id===state.selectedZone) || state.zones[0];

    };
    el.zoneBox.innerHTML=`<b>${z.name}</b> (${z.id})<br><span class='mini'>Domain: ${z.domain} · Owner: ${z.owner} · Control: ${z.control}% · Difficulty: ${z.difficulty}</span>`;

    const renderRoot=(root)=>{
      if(!run){
        root.innerHTML=`<b>${mission.title}</b><div class='mini'>${mission.scenario}</div><div class='mini' style='margin-top:6px'>Constraints: ${mission.constraints.join(" · ")}</div>${latest?`<div class='evt' style='margin-top:6px'><b>Latest Score</b><div class='mini'>Mission ${latest.score.missionScore} · Confidence ${latest.score.confidenceScore} · Consistency ${latest.score.decisionConsistency}</div></div>`:''}<button class='btn mission-choice' data-begin='1'>Begin Mission</button>${renderFeedback(latest)}`;
        const btn=root.querySelector("[data-begin]");
        if(btn) btn.onclick=()=>beginMission(z,mission);
        return;
      }
      const totalSteps=mission.steps.length+1;
      const isFinal=run.stepIndex>=mission.steps.length;
      const step=isFinal?null:mission.steps[run.stepIndex];
      const progress=`Step ${run.stepIndex+1}/${totalSteps}`;
      const contextInfo=isFinal?"Final phase: lock your final strategic decision.":step.context;
      const header=isFinal?mission.finalDecision.text:step.text;
      const options=(isFinal?mission.finalDecision.options:step.options).map((o,i)=>`<button class='btn mission-choice' data-opt='${o.id}'>${i+1}. ${o.text}</button>`).join("");
      const unexpected = (!run.contextEventShown && run.stepIndex===2) ? `<div class='evt'><b>Unexpected Event</b><div class='mini'>${mission.unexpectedEvent}</div></div>` : "";
      root.innerHTML=`<b>${mission.title}</b><div class='mini'>${mission.scenario}</div><div class='mini' style='margin-top:6px'>Constraints: ${mission.constraints.join(" · ")}</div><div class='mini' style='margin-top:6px'><b>${progress}</b></div>${unexpected}<div class='mini' style='margin-top:6px'>${header}</div><div class='mini'>Context: ${contextInfo}</div>${options}${renderFeedback(latest)}`;
      root.querySelectorAll("[data-opt]").forEach(btn=>btn.onclick=()=>advanceMission(z,mission,btn.dataset.opt));
    };

    renderRoot(el.missionBox);
    renderRoot(el.soloBox);
  }

    if(age==="14-17") return {mode:"restricted",recommendHiring:false,label:"Restricted pathway mode with caution labels.",families:fit.slice(0,3).map(f=>f.role)};

    return [{type:"future_fit",items:fit.slice(0,4)},{type:"learning_pathway",items:["Communication loops","Scenario prioritization","Systems mapping"]}];

  function normalizeResultPayload({player,zone,mission,run,effects,outcomeText,startedAt}){
    const fit=roleFitFromSkills(player.skills);
    const missionScoreRaw=(effects.systemsThinking||0)*0.25 + (effects.prioritization||0)*0.20 + (effects.adaptability||0)*0.15 + (effects.crisisResponse||0)*0.20 + (effects.executionReliability||0)*0.20;
    const missionScore=Math.max(0,Math.min(100,Math.round(60+missionScoreRaw*2.4)));
    const positive=Object.values(effects).filter(v=>v>0).length;
    const negative=Object.values(effects).filter(v=>v<0).length;
    const decisionConsistency=Math.max(45,Math.min(99,Math.round(70 + (positive-negative)*3)));
    const confidenceScore=Math.max(40,Math.min(99,Math.round((missionScore*0.65)+(decisionConsistency*0.35))));
    const duration=Math.max(1,Math.round((Date.now()-startedAt)/1000));
    const improved=Object.entries(effects).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    const weakened=Object.entries(effects).filter(([,v])=>v<0).sort((a,b)=>a[1]-b[1]);
    return {
      missionId: mission.id, missionTitle: mission.title, playerId: player.id, duration,
      decisions: run.selections, timeline: run.timeline,
      score:{missionScore,confidenceScore,decisionConsistency}, skills:{...effects},
      roleFit:fit.slice(0,3), outcome:outcomeText,
      recommendations:[
        improved[0]?`Double down on ${skillLabelMap[improved[0][0]]} during higher-difficulty missions.`:"Keep stacking cross-functional wins.",
        weakened[0]?`Mitigate ${skillLabelMap[weakened[0][0]]} trade-offs with contingency planning.`:"Test with tighter constraints to stress consistency."
      ],
      feedback:{
        didWell:improved.slice(0,2).map(([k,v])=>`Strong ${skillLabelMap[k]} (+${v})`),
        missed:weakened.slice(0,2).map(([k,v])=>`Pressure on ${skillLabelMap[k]} (${v})`),
        improved:improved.slice(0,4), weakened:weakened.slice(0,4)
      },
      type:"mission_result", version:"3.0.0", id:crypto.randomUUID(), createdAt:new Date().toISOString(),
      player:{id:player.id,name:player.displayName,userType:player.userType,ageGroup:player.ageGroup,rolePath:player.rolePath},
      mission:{zoneId:zone.id,zoneName:zone.name,domain:zone.domain,title:mission.title,scenario:mission.scenario,difficulty:zone.difficulty,constraints:mission.constraints},
      outcomeMeta:{status:"completed",score:missionScore,consistency:decisionConsistency}, territory:{owner:zone.owner,control:zone.control},
      sourceMeta:{mode:hasFirebase?"firebase":"local-mock",jobsVersion:"seed-v1"},
      render:{preferredLayout:["compact","full","story"][state.missions.length%3],theme:"mars-control"},
      exportMeta:{canSvg:true,canFallback:true,schema:"canonical-mission-result-v3"}
    };
  }
  function validateResultPayload(p){ return !!(p&&p.missionId&&p.missionTitle&&p.playerId&&p.score&&typeof p.score.missionScore==="number"&&p.skills&&Array.isArray(p.timeline)&&Array.isArray(p.decisions)&&p.outcome&&Array.isArray(p.recommendations)); }
  function summarizeResultPayload(p){ return `${p.player.name}: ${p.mission.title} → ${p.score.missionScore} (${p.roleFit[0]?.role||"Generalist"})`; }

  function buildSvgLayout(payload,layout){
    const w=layout==="full"?860:layout==="story"?720:500;
    const h=layout==="full"?420:layout==="story"?320:260;
    return [`<svg xmlns='http://www.w3.org/2000/svg' width='${w}' height='${h}' viewBox='0 0 ${w} ${h}'>`,`<rect width='100%' height='100%' rx='16' fill='#0f1832' stroke='#2f4168'/>`];
  }
  function renderSkillBars(skills,x,y){
    const entries=Object.entries(skills||{}).sort((a,b)=>b[1]-a[1]).slice(0,6);
    return entries.map(([k,v],i)=>`<text x='${x}' y='${y+i*24}' fill='#c7d6ff' font-size='12'>${escapeXml(skillLabelMap[k]||k)}</text><rect x='${x+160}' y='${y-10+i*24}' width='120' height='10' fill='#162645' rx='4'/><rect x='${x+160}' y='${y-10+i*24}' width='${Math.min(120,Math.abs(v)*10)}' height='10' fill='${v>=0?"#00d1b0":"#ff7185"}' rx='4'/>`).join("");
  }
  function renderTimeline(timeline,x,y,max){ return (timeline||[]).slice(0,max).map((e,i)=>`<text x='${x}' y='${y+i*18}' fill='#9fb0d9' font-size='11'>${escapeXml(e.time)}: ${escapeXml(e.event)} / ${escapeXml(e.playerDecision||"-")}</text>`).join(""); }

  function renderRoleFit(payload,x,y){ const top=payload.roleFit[0]||{role:"Generalist",confidence:50}; return `<text x='${x}' y='${y}' fill='#63b6ff' font-size='13'>Top Role: ${escapeXml(top.role)} (${top.confidence}% confidence)</text>`; }
  function renderOutcomeBadge(payload,x,y){ return `<rect x='${x}' y='${y-18}' width='220' height='28' rx='8' fill='#1f3f62'/><text x='${x+8}' y='${y}' fill='#fff' font-size='13'>Score ${payload.score.missionScore} · Confidence ${payload.score.confidenceScore}</text>`; }
  function exportSvgString(parts){ return parts.join("")+"</svg>"; }

  function generateMissionSVG(payload){
    const layout=payload.render?.preferredLayout||"compact";
    const s=buildSvgLayout(payload,layout);
    const timelineY = layout==="full" ? 300 : layout==="story" ? 224 : 190;
    const nextY = layout==="full" ? 392 : layout==="story" ? 286 : 244;
    const timelineCount = layout==="compact" ? 3 : 4;
    s.push(`<text x='20' y='28' fill='#f2f5ff' font-size='16' font-weight='700'>${escapeXml(payload.missionTitle)}</text>`);
    s.push(`<text x='20' y='48' fill='#9fb0d9' font-size='12'>Player: ${escapeXml(payload.player.name)} · Mission: ${escapeXml(payload.missionId)}</text>`);
    s.push(renderOutcomeBadge(payload,20,76));
    s.push(renderRoleFit(payload,250,76));
    s.push(renderSkillBars(payload.skills,20,120));
    s.push(renderTimeline(payload.timeline,20,timelineY,timelineCount));
    s.push(`<text x='20' y='${nextY}' fill='#ffd88f' font-size='11'>Outcome: ${escapeXml(payload.outcome)}</text>`);
    return exportSvgString(s);
  }

  function renderResult(payload,valid){
    markAgent("svg_renderer: svg_render_started");
    logEvent("svg_render_started",{id:payload.id});
    try {
      if(!valid) throw new Error("Invalid payload");
      const svg=generateMissionSVG(payload);
      markAgent("svg_renderer: svg_render_completed");
      logEvent("svg_render_succeeded",{id:payload.id});
      return {svg};
    } catch(err){
      logEvent("svg_render_failed",{id:payload.id,error:String(err)});
      markAgent("svg_renderer: svg_render_failed");
      const fallback={summary:summarizeResultPayload(payload),timeline:(payload.timeline||[]).slice(0,4)};
      logEvent("fallback_render_used",{id:payload.id});
      return {fallback};
    }
  }

  function advanceMission(zone, mission, optionId){
    const run=state.activeMissionRun;
    const user=currentUser();
    if(!run || !user) return;
    const isFinal=run.stepIndex>=mission.steps.length;
    const optionSet=isFinal?mission.finalDecision.options:mission.steps[run.stepIndex].options;
    const option=optionSet.find(o=>o.id===optionId);
    if(!option) return;
    run.selections.push({step:isFinal?"final":mission.steps[run.stepIndex].id,option:option.text,effects:option.effects});
    logEvent("decision_made",{missionId:mission.id,step:isFinal?"final":mission.steps[run.stepIndex].id,option:option.id});
    run.timeline.push({time:`T+${run.selections.length*2}m`,event:isFinal?"Final Decision":(mission.steps[run.stepIndex]?.text||"Decision"),playerDecision:option.text,skillChanges:option.effects});
    if(!isFinal && run.stepIndex===2 && !run.contextEventShown){
      run.timeline.push({time:`T+${run.selections.length*2+1}m`,event:"Unexpected Event",playerDecision:"Responded under pressure",skillChanges:{},details:mission.unexpectedEvent});
      run.contextEventShown=true;
    }
    if(isFinal){
      const effects=aggregateEffects(run);
      applyEffects(user,effects);
      zone.control=Math.max(0,Math.min(100,zone.control+Math.round(Object.values(effects).reduce((a,b)=>a+b,0)/8)));
      if(zone.control>55) zone.owner="player";
      markAgent("skill_analyzer: skill_analysis_started");
      const result = normalizeResultPayload({player:user,zone,mission,run,effects,outcomeText:option.outcome||"Mission completed.",startedAt:run.startedAt||Date.now()});
      logEvent("mission_result_payload_created",{id:result.id,missionId:mission.id});
      const valid=validateResultPayload(result);
      markAgent("skill_analyzer: skill_analysis_completed");
      const rendered=renderResult(result, valid);
      const vaultItem={id:result.id,createdAt:new Date().toISOString(),raw:result,normalized:result,svg:rendered.svg||null,fallback:rendered.fallback||null,report:summarizeResultPayload(result),roleFit:result.roleFit};
      state.proofVault.unshift(vaultItem); state.proofVault=state.proofVault.slice(0,120);
      user.proofVault.unshift({missionId:result.missionId,missionTitle:result.missionTitle,score:result.score.missionScore,skillDeltas:effects,timeline:result.timeline,outcome:result.outcome,timestamp:new Date().toISOString(),svg:vaultItem.svg||null,resultId:result.id});
      user.proofVault=user.proofVault.slice(0,80);
      state.missions.unshift(result);
      updatePlayerProgress(user,result,effects);
      state.roleFitHistory.unshift(result.roleFit);
      if(hasFirebase){
        saveMissionRunToCloud(result,effects).catch(()=>{});
        saveProofToCloud(result,vaultItem,effects).catch(()=>{});
        persistCloud();
      }
      state.activeMissionRun=null;
      markAgent("proof_vault: proof_saved");
      logEvent("proof_saved",{id:result.id});
      logEvent("mission_completed",{id:result.id,missionId:mission.id});
      render();
      return;
    }
    run.stepIndex += 1;
    renderMissionPanel();
  }

  function updatePlayerProgress(user, result, effects){
    ensurePlayerShape(user);
    user.missionsCompleted += 1;
    user.playerStats.missionsCompleted = user.missionsCompleted;
    user.averageScore = ((user.averageScore*(user.missionsCompleted-1))+result.score.missionScore)/user.missionsCompleted;
    user.playerStats.averageScore = user.averageScore;
    user.averageDecisionTime = ((user.averageDecisionTime*(user.missionsCompleted-1))+result.score.decisionTime)/user.missionsCompleted;
    user.playerStats.averageDecisionTime = user.averageDecisionTime;
    user.skillDistribution = Object.fromEntries(skillsList.map(k=>[k,Math.round(user.skills[k]||0)]));
    user.playerStats.skillDistribution = user.skillDistribution;
    user.missionHistory.unshift({missionId:result.missionId,missionTitle:result.missionTitle,score:result.score.missionScore,skillDeltas:effects,timeline:result.timeline,outcome:result.outcome,timestamp:new Date().toISOString()});
    user.missionHistory=user.missionHistory.slice(0,80);
    user.recentSkillChanges.unshift({missionId:result.missionId,skillDeltas:effects,timestamp:new Date().toISOString()});
    user.recentSkillChanges=user.recentSkillChanges.slice(0,10);
    user.roleFit=result.roleFit;
    Object.entries(effects||{}).forEach(([k,v])=>{ state.globalAnalytics.skillSignalTotals[k]=(state.globalAnalytics.skillSignalTotals[k]||0)+v; });
    state.globalAnalytics.missionsCompleted=(state.globalAnalytics.missionsCompleted||0)+1;
  }


  function deriveRoleSuggestions(skills){
    const out=[];
    if((skills.systemsThinking||0)>70) out.push({role:"Systems Engineer",confidence:Math.min(99,Math.round((skills.systemsThinking||0)*0.9))});
    if((skills.prioritization||0)>60) out.push({role:"Operations Analyst",confidence:Math.min(99,Math.round((skills.prioritization||0)*0.88))});
    if((skills.analyticalThinking||0)>70) out.push({role:"Data Analyst",confidence:Math.min(99,Math.round((skills.analyticalThinking||0)*0.9))});
    if(!out.length) out.push(...roleFitFromSkills(skills).slice(0,2).map(r=>({role:r.role,confidence:r.confidence})));
    return out.slice(0,3);
  }

  function renderSkillDashboard(){
    const u=currentUser();
    if(!u){ el.skillDashboardBox.innerHTML='Sign in to see your skill dashboard.'; return; }
    ensurePlayerShape(u);
    const top=Object.entries(u.skills).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const recent=u.recentSkillChanges[0]?.skillDeltas||{};
    const bars=skillsList.map(k=>`<div class='r'><div class='mini'>${skillLabelMap[k]}</div><div class='bar'><span style='width:${Math.min(100,Math.max(0,u.skills[k]))}%'></span></div><div>${Math.round(u.skills[k])}</div></div>`).join('');
    const recentTxt=Object.entries(recent).map(([k,v])=>`${skillLabelMap[k]} ${v>0?'+':''}${v}`).join(' · ') || 'No recent changes';
    const fit=deriveRoleSuggestions(u.skills).map(r=>`<li>${r.role} (${r.confidence}%)</li>`).join('');
    el.skillDashboardBox.innerHTML=`<b>Skill Graph</b><div class='mini'>Current levels and trend signals</div><div class='skills'>${bars}</div><div class='mini' style='margin-top:8px'><b>Recent skill changes:</b> ${recentTxt}</div><div class='mini'><b>Top strengths:</b> ${top.map(([k,v])=>`${skillLabelMap[k]} (${Math.round(v)})`).join(' · ')}</div><div class='mini'><b>Role Fit Suggestions</b></div><ul>${fit}</ul>`;
  }

  function renderAnalytics(){
    const ga=state.globalAnalytics||{};
    const completion=(ga.missionsPlayed?Math.round(((ga.missionsCompleted||0)/ga.missionsPlayed)*100):0);
    const common=Object.entries(ga.skillSignalTotals||{}).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).slice(0,4).map(([k,v])=>`${skillLabelMap[k]||k} (${v>0?'+':''}${v})`).join(' · ') || 'No signals yet';
    el.analyticsBox.innerHTML=`<b>Mission Analytics</b><div class='mini'>Total Players: ${state.users.length}</div><div class='mini'>Missions Played: ${ga.missionsPlayed||0}</div><div class='mini'>Average Completion Rate: ${completion}%</div><div class='mini'>Most Common Skill Signals: ${common}</div>`;
  }

  function renderVault(){
    if(!state.proofVault.length){
      el.vaultBox.innerHTML="No proof entries yet. Complete a mission to save evidence.";
      return;
    }
    el.vaultBox.innerHTML = state.proofVault.slice(0,8).map(v=>`<div class='evt'><b>${escapeXml(v.report)}</b><div class='mini'>${escapeXml(v.createdAt)}</div><div class='row' style='margin-top:6px'><button class='btn ghost' data-view='${v.id}'>View Result</button><button class='btn ghost' data-dl='${v.id}'>Download SVG</button></div><div id='pv-${v.id}'></div></div>`).join("");

    el.vaultBox.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{
      const v=state.proofVault.find(x=>x.id===b.dataset.view);
      if(!v) return;
      const tgt=document.getElementById(`pv-${v.id}`);
      logEvent("result_viewed",{resultId:v.id,missionId:v.raw?.missionId||v.missionId});
      if(!tgt) return;
      tgt.innerHTML = v.svg
        ? `<div class='mini'>SVG Preview</div>${v.svg}`
        : `<div class='mini'>Fallback summary: ${escapeXml(v.fallback?.summary||"Unavailable")}</div><div class='mini'>${(v.fallback?.timeline||[]).map(t=>escapeXml(`${t.time||t.t}: ${t.event}`)).join(" | ")}</div>`;
    });

    el.vaultBox.querySelectorAll("[data-dl]").forEach(b=>b.onclick=()=>{
      const v=state.proofVault.find(x=>x.id===b.dataset.dl);
      if(!v || !v.svg){ alert("No SVG artifact available."); return; }
      const blob=new Blob([v.svg],{type:"image/svg+xml"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download=`proof-${v.id}.svg`; a.click();
      URL.revokeObjectURL(url);
      state.savedReports.push({id:v.id,downloadedAt:new Date().toISOString()});
      saveState();
    });
  }

  function renderRecruiter(){
    const user=currentUser();
    const candidate = user || {displayName:"Mock Candidate",skills:baseUser(),ageGroup:"18+",rolePath:"Generalist",missionHistory:[],proofVault:[]};
    const fit=roleFitFromSkills(candidate.skills||baseUser());
    const recentRuns=state.missions.slice(0,5);
    const missionHistory=(candidate.missionHistory||[]).slice(0,5).map(m=>`<li>${escapeXml(m.missionTitle)} · score ${m.score} · ${escapeXml(m.timestamp)}</li>`).join("") || "<li>No missions yet</li>";
    const timeline=(candidate.missionHistory||[])[0]?.timeline?.slice(0,5).map(t=>`<li>${escapeXml(t.time)} - ${escapeXml(t.event)}: ${escapeXml(t.playerDecision||'')}</li>`).join("") || "<li>No timeline yet</li>";
    const consistency=recentRuns.length?Math.round(recentRuns.reduce((a,m)=>a+m.score.decisionConsistency,0)/recentRuns.length):0;
    const skillGraph=Object.entries(candidate.skills||{}).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>`<div class='mini'>${skillLabelMap[k]}: ${Math.round(v)}</div>`).join('');
    const recruiterTools = user?.userType==='recruiter' ? `<div class='row' style='margin-top:6px'><input class='input grow' id='candidateId' placeholder='Candidate player ID' value='${escapeXml(state.recruiterTarget||'')}'/><button class='btn ghost' id='loadCandidateBtn'>Load Candidate</button></div>` : '';
    el.recruiterBox.innerHTML=`<b>Recruiter Evidence Panel</b><br><span class='mini'>${escapeXml(candidate.displayName)} · ${escapeXml(candidate.rolePath)} · age ${escapeXml(candidate.ageGroup)}</span>
      ${recruiterTools}
      <div class='mini' style='margin-top:6px'><b>Role Fit</b>: ${fit.slice(0,3).map(f=>`${f.role} (${f.confidence}%)`).join(' · ')}</div>
      <div class='mini' style='margin-top:6px'><b>Consistency Score</b>: ${consistency}</div>
      <div class='mini' style='margin-top:6px'><b>Mission History</b></div><ul>${missionHistory}</ul>
      <div class='mini'><b>Decision Timeline (latest)</b></div><ul>${timeline}</ul>
      <div class='mini'><b>Skill Graph</b></div>${skillGraph}
      <div class='mini'><b>Proof Artifacts</b>: ${(candidate.proofVault||[]).slice(0,3).map(p=>`${escapeXml(p.missionTitle)} (${p.score})`).join(' · ')||'None'}</div>
      <button class='btn' id='shortlistBtn'>Shortlist</button>`;

    document.getElementById("shortlistBtn").onclick=()=>{
      state.recruiterActions.unshift({type:"shortlist",candidate:candidate.displayName,at:new Date().toISOString()});
      logEvent("recruiter_shortlisted_candidate",{candidate:candidate.displayName});
      markAgent("recruiter_observer: shortlisted");
      renderRecruiter();
      saveState();
    };

    if(user?.userType==='recruiter'){
      document.getElementById('loadCandidateBtn')?.addEventListener('click', async ()=>{
        const cid=val('candidateId');
        state.recruiterTarget=cid;
        if(!cid) return;
        if(hasFirebase){
          const candidateData = await hydrateUserFromCloud(cid);
          if(candidateData){
            state.users=state.users.filter(x=>x.id!==candidateData.id);
            state.users.push(candidateData);
            state.currentUserId=candidateData.id;
            logEvent('recruiter_loaded_candidate',{candidateId:cid});
            render();
            return;
          }
          alert('Candidate not found');
        }
      });
    }

    if (!state.recruiterViewed) {
      state.recruiterViewed = true;
      logEvent("recruiter_viewed_candidate",{candidate:candidate.displayName});
    }
  }

  function renderSettings(){
    el.settingsBox.innerHTML=`<div class='row'><button class='btn' id='toggleAgents'>System Agents: ${state.agents?"On":"Off"}</button><button class='btn ghost' id='resetBtn'>Reset Local Data</button></div>
      <div class='mini' style='margin-top:8px'>Input mode / Tutorial replay / Accessibility fallback enabled via keyboard arrows + Enter.</div>`;
    document.getElementById("toggleAgents").onclick=()=>{ state.agents=!state.agents; saveState(); render(); };
    document.getElementById("resetBtn").onclick=()=>{ localStorage.removeItem(STORAGE_KEY); location.reload(); };
  }

  function renderRoom(){
    el.roomBox.textContent = `Rooms: ${state.rooms.map(r=>`${r.name} (${r.code})`).join(", ")}`;
  }

  function renderTelemetry(){
    el.telemetry.innerHTML = state.telemetry.slice(0,30).map(e=>`<div class='evt'><b>${escapeXml(e.type)}</b><div class='mini'>${escapeXml(e.at)}</div></div>`).join("");
  }

  function renderTutorial(){
    const t=state.tutorial;
    const [title,body]=tutorialSteps[t.step];
    el.tTitle.textContent=title;
    el.tBody.textContent=body;
    el.tViz.textContent=`STEP ${t.step+1}`;
    el.tCount.textContent=`${t.step+1}/${tutorialSteps.length}`;
    el.tOverlay.classList.toggle("show",t.active);
    el.tBack.disabled=t.step===0;
    el.tNext.textContent=t.step===tutorialSteps.length-1?"Finish":"Next";
  }

  function openTutorial(){
    state.tutorial.active=true;
    state.tutorial.step=0;
    logEvent("tutorial_started",{});
    renderTutorial();
    saveState();
  }

  // Thread Input Controller
  const wheelState={segs:[],active:-1,gesture:null};
  const wheelCommands=["Move","Select","Inspect","Confirm","Cancel","Skill Panel","Next","Previous","Zoom In","Zoom Out","Open Menu","Context Action"];

  function contextMap(){
    if(state.mode==="Demo Mode") return wheelCommands;
    if(state.mode==="Solo Mission Mode") return ["Select Choice","Confirm","Inspect","Cancel","Next","Previous","Skill Panel","Open Menu","Zoom In","Zoom Out","Move","Context Action"];
    return wheelCommands;
  }

  function buildWheel(){
    el.wheel.querySelectorAll(".seg").forEach(s=>s.remove());
    wheelState.segs=[];
    const labels=contextMap(), R=40, C=50;
    for(let i=0;i<12;i++){
      const a=((i/12)*Math.PI*2)-Math.PI/2;
      const x=C+R*Math.cos(a), y=C+R*Math.sin(a);
      const d=document.createElement("div");
      d.className="seg";
      d.style.left=`${x}%`; d.style.top=`${y}%`;
      d.textContent=`${i+1}`;
      d.title=labels[i];
      d.onclick=()=>dispatchThread(i,1,true);
      el.wheel.appendChild(d);
      wheelState.segs.push(d);
    }
  }
  return state.users.find(u=>u.email===email && u.password===password)||null;
}

async function logout(){ if(firebaseReady){ try{await signOut(auth);}catch(_e){} } state.currentUserId=null; save(); render(); }

async function persistMissionRun(run,svg){
  const user=currentUser(); if(!user) return;
  if(firebaseReady){
    await addDoc(collection(db,'missionRuns'),{playerId:user.id,missionId:run.missionId,decisions:run.decisions,score:run.successScore,skillDelta:run.skillDelta,timestamp:serverTimestamp()});
    await addDoc(collection(db,'proofVault'),{playerId:user.id,missionId:run.missionId,svgProof:svg,timestamp:serverTimestamp(),score:run.successScore});
    await setDoc(doc(db,'skillProfiles',user.id),{playerId:user.id,skills:user.skills,totalSkillScore:totalSkillScore(user.skills),updatedAt:serverTimestamp()},{merge:true});
    await updateDoc(doc(db,'players',user.id),{skills:user.skills,missionsPlayed:user.missionsPlayed,missionsCompleted:user.missionsCompleted});
  }
}

function renderTabs(){
  el.tabs.innerHTML=tabs.map(t=>`<button class="${state.tab===t?'active':''}" data-tab="${t}">${t}</button>`).join('');
  el.tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab; render();});
}

function renderAuth(){
  const u=currentUser();
  if(u){ el.authBox.innerHTML=`<b>${u.name||u.email}</b><div class='mini'>Mode: ${u.mode}</div><div class='mini'>Total Skill Score: ${totalSkillScore(u.skills)}</div>`; return; }
  el.authBox.innerHTML=`<div class='grid'>
    <input id='name' placeholder='Name'><input id='email' placeholder='Email'>
    <input id='pass' type='password' placeholder='Password'><select id='mode'><option value='player'>Player</option><option value='recruiter'>Recruiter</option></select>
    <div class='row'><button id='signup'>Sign up</button><button id='login'>Login</button></div></div>`;
  document.getElementById('signup').onclick=async()=>{
    try{
      const user=await signup(v('email'),v('pass'),v('name')||'Player',v('mode'));
      state.users=state.users.filter(x=>x.id!==user.id); state.users.push(user); state.currentUserId=user.id; save(); render();
    }catch(e){ alert(e.message||'Signup failed'); }

  function render(){
    setupTabs();
    el.panes.forEach(p=>p.classList.toggle("active",p.dataset.pane===state.mode));

    renderAuth();
    renderSkills();
    renderTelemetry();
    renderTutorial();
    renderChips();

    // Always required shared content
    buildMap();
    renderMissionPanel();
    renderRoom();

    // Pane-specific renders to avoid side effects when hidden
    if(state.mode==="Recruiter View") renderRecruiter();
    if(state.mode==="Proof Vault") renderVault();
    if(state.mode==="Skill Dashboard") renderSkillDashboard();
    if(state.mode==="Analytics") renderAnalytics();
    if(state.mode==="Settings") renderSettings();

    // Keep content fresh without side effects
    if(state.mode!=="Proof Vault") el.vaultBox.innerHTML = "Proof vault ready. Open this mode to inspect artifacts.";
    if(state.mode!=="Recruiter View") el.recruiterBox.innerHTML = "Recruiter view ready. Open this mode to inspect candidate evidence.";
    if(state.mode!=="Skill Dashboard") el.skillDashboardBox.innerHTML = "Skill dashboard ready. Open this mode to inspect growth.";
    if(state.mode!=="Analytics") el.analyticsBox.innerHTML = "Analytics dashboard ready. Open this mode to inspect platform metrics.";

    buildWheel();
    saveState();
  }

  function val(id){ const n=document.getElementById(id); return n?n.value.trim():""; }
  function escapeXml(str){ return String(str||"").replace(/[<>&'\"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;","'":"&apos;","\"":"&quot;"}[c])); }

  // Event bindings
  el.createRoomBtn.onclick=()=>{
    const n=el.roomName.value.trim()||"Mission Room";
    const c=Math.random().toString(36).slice(2,7).toUpperCase();
    const u=currentUser();
    state.rooms.push({name:n,code:c,members:[u?u.displayName:"Guest"]});
    saveState(); renderRoom();
  };
  document.getElementById('login').onclick=async()=>{
    try{
      const user=await login(v('email'),v('pass')); if(!user){ alert('Invalid credentials'); return; }
      state.users=state.users.filter(x=>x.id!==user.id); state.users.push(user); state.currentUserId=user.id; save(); render();
    }catch(e){ alert(e.message||'Login failed'); }
  };
}

function renderMissionPane(){
  const user=currentUser();
  const cards = missions.map(m=>`<div class='mission'><b>${m.title}</b><div class='mini'>${m.scenario}</div><div class='mini'>Category: ${m.category}</div><button data-start='${m.id}' ${!user?'disabled':''}>Start Mission</button></div>`).join('');
  const active = missions.find(m=>m.id===state.activeMissionId);
  let runUI='';
  if(active){
    const idx=state.decisionStep;
    if(idx<active.decisions.length){
      const d=active.decisions[idx];
      runUI=`<div class='mission'><b>${active.title} · Decision ${idx+1}/${active.decisions.length}</b><div class='mini'>Choose your step:</div><button id='choose'>${d.text}</button></div>`;
    } else {
      runUI=`<div class='mission'><b>${active.title}</b><div class='mini'>All decisions complete. Run simulation.</div><button id='simulate'>Simulate Result</button></div>`;
    }
  }
  el.missionPane.innerHTML=`<h3>Mission Engine</h3>${runUI}<div class='grid'>${cards}</div>`;
  el.missionPane.querySelectorAll('[data-start]').forEach(b=>b.onclick=()=>{state.activeMissionId=b.dataset.start;state.decisionStep=0;state.currentRun=[];logEvent('mission_started',{missionId:state.activeMissionId});save();render();});
  document.getElementById('choose')?.addEventListener('click',()=>{
    const m=missions.find(x=>x.id===state.activeMissionId); const d=m.decisions[state.decisionStep]; state.currentRun.push(d); state.decisionStep++; logEvent('decision_made',{missionId:m.id,step:state.decisionStep}); save(); render();
  });
  document.getElementById('simulate')?.addEventListener('click',runSimulation);
}

function runSimulation(){
  const user=currentUser(); if(!user) return;
  const mission=missions.find(m=>m.id===state.activeMissionId); if(!mission) return;
  const skillDelta=cloneSkills(); state.currentRun.forEach(d=>Object.entries(d.impact).forEach(([k,v])=>{skillDelta[k]+=v;user.skills[k]=(user.skills[k]||0)+v;}));
  const efficiency=Math.min(100,45+totalSkillScore(skillDelta)*3);
  const risk=Math.max(5,60-Math.round((skillDelta.riskManagement+skillDelta.prioritization+skillDelta.logic)*8));
  const cost=Math.max(10,70-Math.round((skillDelta.resourceOptimization+skillDelta.strategicThinking)*7));
  const successScore=Math.round((efficiency*0.5)+((100-risk)*0.3)+((100-cost)*0.2));
  const run={playerId:user.id,missionId:mission.id,missionName:mission.title,decisions:state.currentRun.map(x=>x.text),score:successScore,skillDelta,timestamp:new Date().toISOString(),efficiency,risk,cost,successScore};
  user.missionsPlayed++; user.missionsCompleted++; user.history.unshift(run);
  state.missionRuns.unshift(run); state.latestResult=run;
  captureHex(mission.id);
  const svg=buildProofSvg(user,run);
  user.proofs.unshift({missionId:run.missionId,svgProof:svg,timestamp:run.timestamp,score:run.successScore});
  state.proofs.unshift({playerId:user.id,missionId:run.missionId,svgProof:svg,timestamp:run.timestamp,score:run.successScore});
  persistMissionRun(run,svg).catch(()=>{});
  logEvent('mission_completed',{missionId:mission.id,score:run.successScore});
  state.activeMissionId=null; state.decisionStep=0; state.currentRun=[]; save(); render();
}

function captureHex(missionId){
  const idx=state.hexes.findIndex(h=>h.id===missionId); if(idx<0) return;
  state.hexes[idx].captured=true;
  if(state.hexes[idx+1]) state.hexes[idx+1].unlocked=true;
}

function renderMap(){
  const hexes = state.hexes.map((h,i)=>{
    const cx=90+(i%3)*140+(Math.floor(i/3)%2?70:0), cy=90+Math.floor(i/3)*120, r=42;
    const pts=[0,60,120,180,240,300].map(a=>{const rad=Math.PI*a/180; return `${cx+r*Math.cos(rad)},${cy+r*Math.sin(rad)}`}).join(' ');
    const cls=`hex ${h.cat} ${h.unlocked?'':'locked'} ${h.captured?'captured':''}`;
    return `<polygon class='${cls}' points='${pts}'></polygon><text x='${cx-18}' y='${cy+4}' fill='#fff' font-size='10'>${h.label}</text>`;
  }).join('');
  el.mapPane.innerHTML=`<h3>Hex Map Progression</h3><svg class='hex-map' viewBox='0 0 520 360'>${hexes}</svg><div class='mini'>science blue · business gold · security red · engineering green · leadership purple</div>`;
}

function renderResults(){
  const r=state.latestResult;
  if(!r){ el.resultsPane.innerHTML='<h3>Result Simulation</h3><div class="mini">Complete a mission to view animated simulation metrics.</div>'; return; }
  el.resultsPane.innerHTML=`<h3>Result Simulation</h3><div class='result'>
    <div><b>${r.missionName}</b> · Success ${r.successScore}</div>
    ${metric('Efficiency',r.efficiency)}${metric('Risk',100-r.risk)}${metric('Cost',100-r.cost)}${metric('Success Score',r.successScore)}
  </div>`;
  setTimeout(()=>{document.querySelectorAll('.anim').forEach(n=>n.style.width=n.dataset.w+'%');},40);
}
function metric(label,val){ return `<div class='skill'><div class='mini'>${label}</div><div class='bar'><span class='anim' data-w='${val}' style='width:0%'></span></div><div>${Math.round(val)}</div></div>`; }

function topSkills(sk){return Object.entries(sk).sort((a,b)=>b[1]-a[1]).slice(0,3);}
function buildProofSvg(user,run){
  const top=topSkills(user.skills).map(([k,v],i)=>`<text x='20' y='${130+i*22}' fill='#cbd9ff' font-size='13'>${k}: ${v}</text>`).join('');
  const tl=run.decisions.map((d,i)=>`<text x='20' y='${220+i*18}' fill='#9db0df' font-size='12'>${i+1}. ${escapeXml(d)}</text>`).join('');
  return `<svg xmlns='http://www.w3.org/2000/svg' width='720' height='340' viewBox='0 0 720 340'><rect width='720' height='340' fill='#0f1730'/><rect x='12' y='12' width='696' height='316' rx='12' fill='none' stroke='#324a7b'/><text x='20' y='36' fill='#f3f7ff' font-size='22' font-family='sans-serif'>SkillHex Proof Card</text><text x='20' y='64' fill='#8fb6ff' font-size='15'>Player: ${escapeXml(user.name||user.email)}</text><text x='20' y='86' fill='#8fb6ff' font-size='15'>Mission: ${escapeXml(run.missionName)}</text><text x='20' y='108' fill='#ffd27a' font-size='15'>Score: ${run.successScore}</text><text x='20' y='180' fill='#f3f7ff' font-size='15'>Top 3 Skills</text>${top}<text x='20' y='202' fill='#f3f7ff' font-size='15'>Decision Timeline</text>${tl}</svg>`;
}

function downloadSvg(svg,id){const b=new Blob([svg],{type:'image/svg+xml'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`proof-${id}.svg`;a.click();URL.revokeObjectURL(u);}

function renderProof(){
  const u=currentUser(); if(!u){ el.proofPane.innerHTML='<h3>SVG Proof Vault</h3><div class="mini">Login required.</div>'; return; }
  const list=(u.proofs||[]).map((p,i)=>`<div class='mission'><b>${p.missionId}</b><div class='mini'>Score ${p.score}</div><div class='row'><button data-open='${i}'>View Result</button><button data-dl='${i}'>Export SVG</button></div><div id='pv-${i}' class='proof'></div></div>`).join('')||"<div class='mini'>No proofs yet.</div>";
  el.proofPane.innerHTML=`<h3>SVG Proof Generator / Vault</h3>${list}`;
  el.proofPane.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{const i=+b.dataset.open; document.getElementById(`pv-${i}`).innerHTML=u.proofs[i].svgProof; logEvent('result_viewed',{missionId:u.proofs[i].missionId});});
  el.proofPane.querySelectorAll('[data-dl]').forEach(b=>b.onclick=()=>{const i=+b.dataset.dl; downloadSvg(u.proofs[i].svgProof,u.proofs[i].missionId);});
}

async function renderLeaderboard(){
  let players=[...state.users];
  if(firebaseReady){
    try{
      const snaps=await getDocs(query(collection(db,'skillProfiles'),orderBy('totalSkillScore','desc'),limit(10)));
      const cloud=[];
      for(const d of snaps.docs){ const x=d.data(); const p=await getDoc(doc(db,'players',x.playerId)); cloud.push({name:p.data()?.name||x.playerId,total:x.totalSkillScore||0}); }
      el.leaderboardPane.innerHTML=`<h3>Leaderboard</h3>${cloud.map((p,i)=>`<div class='mission'>#${i+1} ${p.name} · ${p.total}</div>`).join('')||'<div class="mini">No data</div>'}`;
      return;
    }catch(_e){}
  }
  players.sort((a,b)=>totalSkillScore(b.skills)-totalSkillScore(a.skills));
  el.leaderboardPane.innerHTML=`<h3>Leaderboard</h3>${players.map((p,i)=>`<div class='mission'>#${i+1} ${p.name||p.email} · ${totalSkillScore(p.skills)}</div>`).join('')||'<div class="mini">No players yet</div>'}`;
}

function renderRecruiter(){
  const u=currentUser();
  if(!u || u.mode!=='recruiter'){ el.recruiterPane.innerHTML='<h3>Recruiter View</h3><div class="mini">Login as recruiter to inspect candidates.</div>'; return; }
  const candidates=state.users.filter(x=>x.mode==='player');
  const target = candidates.find(x=>x.id===state.recruiterTarget) || candidates[0];
  const options=candidates.map(c=>`<option value='${c.id}' ${target&&c.id===target.id?'selected':''}>${c.name||c.email}</option>`).join('');
  const graph = target ? Object.entries(target.skills).map(([k,v])=>`<div class='skill'><div class='mini'>${k}</div><div class='bar'><span style='width:${Math.min(100,v*8)}%'></span></div><div>${v}</div></div>`).join('') : '';
  const history = target ? (target.history||[]).map(h=>`<li>${h.missionId} · ${h.score}</li>`).join('') : '';
  const proofs = target ? (target.proofs||[]).map((p,i)=>`<button data-cpv='${i}'>${p.missionId} Proof</button>`).join(' ') : '';
  el.recruiterPane.innerHTML=`<h3>Recruiter View</h3>${target?`<div class='row'><select id='cand'>${options}</select><button id='load'>Load</button></div><div class='mini'>Candidate: ${target.name||target.email}</div><h4>Skill Graph</h4>${graph}<h4>Mission History</h4><ul>${history||'<li>none</li>'}</ul><h4>SVG Proofs</h4><div id='proofView' class='proof'></div>${proofs}`:'<div class="mini">No candidates available.</div>'}`;
  document.getElementById('load')?.addEventListener('click',()=>{state.recruiterTarget=document.getElementById('cand').value;save();render();});
  el.recruiterPane.querySelectorAll('[data-cpv]').forEach(b=>b.onclick=()=>{document.getElementById('proofView').innerHTML=target.proofs[+b.dataset.cpv].svgProof;});
}

function renderTutorial(){
  const steps=[
    "1. Introduction — Enter Mission Engine and choose a scenario.",
    "2. Decision Steps — Execute decisions sequentially for each mission.",
    "3. Simulation Results — Run efficiency/risk/cost/success simulation.",
    "4. Skill Upgrades — See skill deltas and graph growth.",
    "5. Hex Map Expansion — Captured missions unlock new hexes."
  ];
  el.tutorialPane.innerHTML=`<h3>Mission Tutorial</h3>${steps.map(s=>`<div class='mission'>${s}</div>`).join('')}`;
}

function renderSkillGraph(){
  const u=currentUser(); const sk=u?u.skills:skillsTemplate;
  el.skillGraph.innerHTML=Object.entries(sk).map(([k,v])=>`<div class='skill'><div class='mini'>${k}</div><div class='bar'><span style='width:${Math.min(100,v*8)}%'></span></div><div>${v}</div></div>`).join('');
}

function renderTimeline(){
  const u=currentUser();
  if(!u){el.timeline.textContent='No session.';return;}
  el.timeline.innerHTML=(u.history||[]).slice(0,8).map(h=>`<div class='mini'>${h.missionId} · score ${h.score} · ${new Date(h.timestamp).toLocaleString()}</div>`).join('')||'No mission history.';
}

function renderPanes(){
  [el.missionPane,el.mapPane,el.resultsPane,el.proofPane,el.leaderboardPane,el.recruiterPane,el.tutorialPane].forEach(p=>p.classList.remove('active'));
  ({"Mission Engine":el.missionPane,"Hex Map":el.mapPane,"Results":el.resultsPane,"Proof Vault":el.proofPane,"Leaderboard":el.leaderboardPane,"Recruiter View":el.recruiterPane,"Tutorial":el.tutorialPane}[state.tab]).classList.add('active');
}

async function render(){
  renderTabs(); renderPanes(); renderAuth(); renderSkillGraph(); renderTimeline();
  renderMissionPane(); renderMap(); renderResults(); renderProof(); await renderLeaderboard(); renderRecruiter(); renderTutorial();
  const u=currentUser(); el.userChip.textContent=u?`${u.name||u.email} (${u.mode})`:'Guest'; save();
}

function v(id){return document.getElementById(id)?.value?.trim()||'';}
function escapeXml(s){return String(s||'').replace(/[<>&'\"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;","'":"&apos;","\"":"&quot;"}[c]));}

el.logoutBtn.onclick=logout;
if(firebaseReady){ onAuthStateChanged(auth, async (u)=>{ if(u && !state.currentUserId){ try{const me=await login(u.email,''); if(me){state.users=state.users.filter(x=>x.id!==me.id);state.users.push(me);state.currentUserId=me.id; save(); render();}}catch(_e){} } }); }
render();
  };
  el.tSkip.onclick=()=>{ state.tutorial.active=false; state.tutorial.seen=true; render(); };

  el.replayTutorialBtn.onclick=openTutorial;
  el.toggleInputBtn.onclick=()=>{ state.inputMode=state.inputMode==="thread"?"standard":"thread"; logEvent("input_mode_selected",{mode:state.inputMode}); render(); };
  el.toggleWheelBtn.onclick=()=>{ state.wheelDocked=!state.wheelDocked; saveState(); renderChips(); };
  el.logoutBtn.onclick=()=>{ logout(); };

  document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowRight") { cycleTab(1); render(); }
    if(e.key==="ArrowLeft") { cycleTab(-1); render(); }
    if(e.key==="Enter" && state.inputMode==="thread") dispatchThread((wheelState.active+12)%12,1,true);
    if(e.key.toLowerCase()==="t") { state.inputMode=state.inputMode==="thread"?"standard":"thread"; logEvent("input_mode_selected",{mode:state.inputMode}); render(); }
  });

  if(hasFirebase && auth){
    onAuthStateChanged(auth, async (fbUser)=>{
      if(fbUser){
        const cloudUser = await hydrateUserFromCloud(fbUser.uid);
        if(cloudUser){
          state.users = state.users.filter(u=>u.id!==cloudUser.id);
          state.users.push(cloudUser);
          state.currentUserId=cloudUser.id;
          state.session={id:cloudUser.id};
          saveState();
          render();
        }
      }
    });
  }

  bindWheelPointer();
  if(!state.tutorial.seen) openTutorial();
  render();
  logEvent("app_loaded",{firebase:hasFirebase});
})();
</script>
